{% extends 'base.html' %}
{% block content %}
<div class="container mt-5">
  <div class="card shadow-lg border-0 rounded-4 p-4 mx-auto" style="max-width: 420px;">
    <h3 class="text-center text-primary mb-3">🔐 Forgot Password</h3>
    <form method="POST" action="/forgot_password">
      <input type="text" name="phone" class="form-control mb-3" placeholder="Enter registered phone number" required>
      <button type="submit" class="btn btn-primary w-100">Send OTP</button>
    </form>
  </div>
</div>
{% endblock %}
