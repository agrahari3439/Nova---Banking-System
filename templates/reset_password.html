{% extends 'base.html' %}
{% block content %}
<div class="container mt-5">
  <div class="card shadow-lg border-0 rounded-4 p-4 mx-auto" style="max-width: 420px;">
    <h3 class="text-center text-warning mb-3">🔑 Reset Password</h3>
    <form method="POST" action="/reset_password">
      <input type="hidden" name="phone" value="{{ phone }}">
      <input type="password" name="new_password" class="form-control mb-3" placeholder="Enter new password" required>
      <button class="btn btn-warning w-100">Update Password</button>
    </form>
  </div>
</div>
{% endblock %}
