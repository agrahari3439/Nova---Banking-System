{% extends 'base.html' %}
{% block content %}
<div class="container mt-5">
  <div class="card shadow-lg border-0 rounded-4 p-4 mx-auto" style="max-width: 420px;">
    <h3 class="text-center text-success mb-3">✅ Verify OTP</h3>
    <form method="POST" action="/verify_otp">
      <input type="hidden" name="phone" value="{{ phone }}">
      <input type="text" name="otp" class="form-control mb-3" placeholder="Enter 6-digit OTP" required>
      <button class="btn btn-success w-100">Verify OTP</button>
    </form>
  </div>
</div>
{% endblock %}
